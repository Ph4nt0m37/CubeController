<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Controller</title>
    <link rel="stylesheet" href="styles/root.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="main">
        <button id="connect-button">Connect</button>
        <h1 id="connection-text">Waiting for connection...</h1>
        <div class="keybinds-list-div">
            <!-- U moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>U:</p>
                    <p class="key U">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>U2:</p>
                    <p class="key U2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>U':</p>
                    <p class="key U'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <!-- D moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>D:</p>
                    <p class="key D">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>D2:</p>
                    <p class="key D2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>D':</p>
                    <p class="key D'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <!-- F moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>F:</p>
                    <p class="key F">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>F2:</p>
                    <p class="key F2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>F':</p>
                    <p class="key F'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <!-- B moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>B:</p>
                    <p class="key B">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>B2:</p>
                    <p class="key B2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>B':</p>
                    <p class="key B'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <!-- R moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>R:</p>
                    <p class="key R">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>R2:</p>
                    <p class="key R2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>R':</p>
                    <p class="key R'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <!-- L moves -->
            <div class="keybind-div">
                <div class="key-div">
                    <p>L:</p>
                    <p class="key L">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>L2:</p>
                    <p class="key L2">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
            <div class="keybind-div">
                <div class="key-div">
                    <p>L':</p>
                    <p class="key L'">?</p>
                </div>
                <input class="time-input" type="number" min="1" placeholder="Time ms">
            </div>
        </div>
        <h2 id="last-move">?</h2>
    </div>
</body>
<script type="module" src="scripts/index.js"></script>
<script type="module" src="scripts/bluetooth.js"></script>
</html>
